<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎱 로또 번호 추천</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #fff;
      text-align: center;
      padding: 20px 16px 16px;
    }
    .header h1 { font-size: 1.5rem; letter-spacing: 1px; }
    .header p { font-size: 0.8rem; color: #aaa; margin-top: 4px; }

    /* 탭 */
    .tabs {
      display: flex;
      border-bottom: 2px solid #e8e8e8;
      background: #fafafa;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: #999;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #1a1a2e;
      border-bottom: 3px solid #FBC400;
      margin-bottom: -2px;
    }
    .tab-btn:hover:not(.active) { background: #f0f0f0; color: #555; }

    /* 콘텐츠 영역 */
    .content { padding: 16px; }

    /* 번호판 */
    .grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 5px;
      margin-bottom: 16px;
    }
    .num-btn {
      aspect-ratio: 1;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      position: relative;
    }
    .num-btn:hover { transform: scale(1.1); z-index: 1; }
    .num-btn.pinned {
      background: #1a1a2e;
      border-color: #FBC400;
      color: #FBC400;
      box-shadow: 0 0 8px rgba(251,196,0,0.4);
    }
    .num-btn.excluded {
      background: #f5f5f5;
      border-color: #ddd;
      color: #bbb;
      text-decoration: line-through;
    }
    .num-btn.selected-manual {
      border-color: #069CE7;
      background: #e8f4fd;
      color: #0077aa;
    }

    /* 수동 모드 카운터 */
    .manual-count {
      text-align: center;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 12px;
    }
    .manual-count span { font-weight: 700; color: #069CE7; }

    /* 태그 섹션 */
    .tag-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .tag-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .tag-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .clear-btn {
      font-size: 0.72rem;
      color: #999;
      border: 1px solid #ddd;
      background: #fff;
      padding: 2px 8px;
      border-radius: 12px;
      cursor: pointer;
    }
    .clear-btn:hover { background: #fee; color: #c00; border-color: #c00; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; min-height: 24px; }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .tag.excluded-tag { background: #ffeaea; color: #c00; }
    .tag.pinned-tag { background: #1a1a2e; color: #FBC400; }
    .tag .remove { cursor: pointer; opacity: 0.7; }
    .tag .remove:hover { opacity: 1; }
    .empty-tag { font-size: 0.78rem; color: #bbb; }

    /* 생성 버튼 */
    .generate-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FBC400, #f0a800);
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }
    .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(251,196,0,0.4); }
    .generate-btn:active { transform: translateY(0); }

    /* 결과 */
    .result-box {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .result-title { font-size: 0.85rem; font-weight: 700; color: #555; }
    .copy-btn {
      font-size: 0.75rem;
      padding: 4px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: #666;
    }
    .copy-btn:hover { background: #069CE7; color: #fff; border-color: #069CE7; }
    .balls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .ball {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.2);
      position: relative;
      overflow: hidden;
    }
    .ball::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 10px;
      width: 14px;
      height: 8px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    .ball.empty-ball {
      background: #eee;
      box-shadow: none;
      color: #ccc;
      font-size: 1.2rem;
    }
    .ball.empty-ball::before { display: none; }

    /* 이력 */
    .history-section { margin-top: 8px; }
    .history-title { font-size: 0.78rem; font-weight: 700; color: #999; margin-bottom: 8px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      border-bottom: 1px dashed #eee;
      font-size: 0.78rem;
      color: #777;
    }
    .history-item:last-child { border-bottom: none; }
    .history-num {
      display: inline-block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      text-align: center;
      line-height: 22px;
      font-weight: 700;
      font-size: 0.7rem;
      color: #fff;
      flex-shrink: 0;
    }

    /* 하단 버튼 */
    .footer-btns {
      display: flex;
      gap: 8px;
    }
    .reset-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #eee;
      border-radius: 10px;
      background: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
    }
    .reset-btn:hover { border-color: #ff6b6b; color: #ff6b6b; }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a2e;
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 1000;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 반응형 */
    @media (max-width: 400px) {
      .grid { gap: 4px; }
      .num-btn { font-size: 0.7rem; border-radius: 6px; }
      .ball { width: 38px; height: 38px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>🎱 로또 번호 추천</h1>
    <p>6/45 로또 번호 생성기</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-mode="auto">🎲 자동</button>
    <button class="tab-btn" data-mode="semi">🔒 반자동</button>
    <button class="tab-btn" data-mode="manual">✍️ 수동</button>
  </div>

  <div class="content">
    <!-- 수동 모드 카운터 -->
    <div class="manual-count" id="manualCount" style="display:none">
      선택: <span id="manualCountNum">0</span> / 6
    </div>

    <!-- 번호판 -->
    <div class="grid" id="grid"></div>

    <!-- 제외 번호 태그 -->
    <div class="tag-section">
      <div class="tag-header">
        <span class="tag-label">❌ 제외 번호</span>
        <button class="clear-btn" id="clearExcluded">전체 해제</button>
      </div>
      <div class="tags" id="excludedTags"></div>
    </div>

    <!-- 고정 번호 태그 -->
    <div class="tag-section">
      <div class="tag-header">
        <span class="tag-label">📌 고정 번호</span>
        <button class="clear-btn" id="clearPinned">전체 해제</button>
      </div>
      <div class="tags" id="pinnedTags"></div>
    </div>

    <!-- 생성 버튼 -->
    <button class="generate-btn" id="generateBtn">🎲 추천 번호 생성</button>

    <!-- 결과 -->
    <div class="result-box">
      <div class="result-header">
        <span class="result-title">🏆 추천 번호</span>
        <button class="copy-btn" id="copyBtn">📋 복사</button>
      </div>
      <div class="balls" id="result"></div>
    </div>

    <!-- 이력 -->
    <div class="history-section">
      <div class="history-title">🕘 최근 이력 (최대 5회)</div>
      <div id="historyList"></div>
    </div>

    <!-- 초기화 -->
    <div class="footer-btns" style="margin-top:12px">
      <button class="reset-btn" id="resetBtn">🔄 전체 초기화</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── 상태 ──────────────────────────────────────────────
  const state = {
    mode: 'auto',
    excluded: new Set(),
    pinned: new Set(),
    selected: new Set(),
    history: [],
    lastResult: []
  };

  // ── 볼 색상 ───────────────────────────────────────────
  function getBallColor(n) {
    if (n <= 9)  return '#FBC400';
    if (n <= 19) return '#069CE7';
    if (n <= 29) return '#FF7272';
    if (n <= 39) return '#AAAAAA';
    return '#B0D840';
  }

  // ── 번호판 생성 ───────────────────────────────────────
  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let n = 1; n <= 45; n++) {
      const btn = document.createElement('button');
      btn.className = 'num-btn';
      btn.textContent = n;
      btn.dataset.num = n;
      btn.addEventListener('click', () => onNumClick(n));
      grid.appendChild(btn);
    }
  }

  function onNumClick(n) {
    if (state.mode === 'manual') {
      // 수동 모드: 기본/선택 토글 (제외/고정 무시)
      if (state.selected.has(n)) {
        state.selected.delete(n);
      } else {
        if (state.selected.size >= 6) {
          showToast('⚠️ 최대 6개까지 선택 가능합니다');
          return;
        }
        state.selected.add(n);
      }
    } else {
      // 자동/반자동: 기본 → 고정 → 제외 → 기본 순환
      if (state.pinned.has(n)) {
        state.pinned.delete(n);
        state.excluded.add(n);
      } else if (state.excluded.has(n)) {
        state.excluded.delete(n);
      } else {
        // 기본 → 고정
        if (state.pinned.size >= 6) {
          showToast('⚠️ 고정 번호는 최대 6개입니다');
          return;
        }
        if (state.excluded.size >= 39) {
          showToast('⚠️ 제외 번호는 최대 39개입니다 (최소 6개 번호 필요)');
          return;
        }
        state.pinned.add(n);
      }
    }
    render();
  }

  // ── Fisher-Yates 셔플 ─────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── 번호 생성 ─────────────────────────────────────────
  function generate(pinned, excluded) {
    const pool = Array.from({ length: 45 }, (_, i) => i + 1)
      .filter(n => !excluded.has(n) && !pinned.has(n));
    const need = 6 - pinned.size;
    if (pool.length < need) throw new Error('제외 번호를 줄여주세요');
    const picked = shuffle(pool).slice(0, need);
    return [...pinned, ...picked].sort((a, b) => a - b);
  }

  // ── 생성 버튼 ─────────────────────────────────────────
  document.getElementById('generateBtn').addEventListener('click', () => {
    try {
      let result;
      if (state.mode === 'auto') {
        result = generate(new Set(), state.excluded);
      } else if (state.mode === 'semi') {
        result = generate(state.pinned, state.excluded);
      } else {
        // 수동
        if (state.selected.size !== 6) {
          showToast('⚠️ 6개를 선택해주세요');
          return;
        }
        result = [...state.selected].sort((a, b) => a - b);
      }
      state.lastResult = result;
      addHistory(result);
      renderResult(result);
    } catch (e) {
      showToast('⚠️ ' + e.message);
    }
  });

  function addHistory(result) {
    state.history.unshift([...result]);
    if (state.history.length > 5) state.history.pop();
    renderHistory();
  }

  // ── 탭 ───────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.mode = btn.dataset.mode;
      state.selected.clear();
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // ── 태그 해제 ─────────────────────────────────────────
  document.getElementById('clearExcluded').addEventListener('click', () => {
    state.excluded.clear();
    render();
  });
  document.getElementById('clearPinned').addEventListener('click', () => {
    state.pinned.clear();
    render();
  });

  // ── 복사 ─────────────────────────────────────────────
  document.getElementById('copyBtn').addEventListener('click', () => {
    if (!state.lastResult.length) { showToast('⚠️ 먼저 번호를 생성하세요'); return; }
    const text = state.lastResult.join(', ');
    navigator.clipboard.writeText(text).then(() => {
      showToast('📋 복사 완료: ' + text);
    }).catch(() => {
      showToast('복사 실패 — 브라우저 권한을 확인하세요');
    });
  });

  // ── 초기화 ───────────────────────────────────────────
  document.getElementById('resetBtn').addEventListener('click', () => {
    state.excluded.clear();
    state.pinned.clear();
    state.selected.clear();
    state.lastResult = [];
    state.history = [];
    render();
    renderResult([]);
    renderHistory();
  });

  // ── 렌더링 ───────────────────────────────────────────
  function render() {
    renderGrid();
    renderTags();
    renderManualCount();
  }

  function renderGrid() {
    document.querySelectorAll('.num-btn').forEach(btn => {
      const n = parseInt(btn.dataset.num);
      btn.classList.remove('pinned', 'excluded', 'selected-manual');
      if (state.mode === 'manual') {
        if (state.selected.has(n)) btn.classList.add('selected-manual');
      } else {
        if (state.pinned.has(n)) btn.classList.add('pinned');
        else if (state.excluded.has(n)) btn.classList.add('excluded');
      }
    });
  }

  function renderTags() {
    renderTagSet('excludedTags', state.excluded, 'excluded-tag', n => {
      state.excluded.delete(n); render();
    });
    renderTagSet('pinnedTags', state.pinned, 'pinned-tag', n => {
      state.pinned.delete(n); render();
    });
  }

  function renderTagSet(containerId, set, cls, onRemove) {
    const el = document.getElementById(containerId);
    if (set.size === 0) {
      el.innerHTML = '<span class="empty-tag">없음</span>';
      return;
    }
    el.innerHTML = '';
    [...set].sort((a, b) => a - b).forEach(n => {
      const tag = document.createElement('span');
      tag.className = `tag ${cls}`;
      tag.innerHTML = `${n}<span class="remove" data-n="${n}"> ✕</span>`;
      tag.querySelector('.remove').addEventListener('click', () => onRemove(n));
      el.appendChild(tag);
    });
  }

  function renderManualCount() {
    const el = document.getElementById('manualCount');
    el.style.display = state.mode === 'manual' ? 'block' : 'none';
    document.getElementById('manualCountNum').textContent = state.selected.size;
  }

  function renderResult(nums) {
    const el = document.getElementById('result');
    if (!nums.length) {
      el.innerHTML = '<div class="ball empty-ball" style="width:44px;height:44px;font-size:1.4rem">?</div>'.repeat(6);
      return;
    }
    el.innerHTML = nums.map(n => {
      const color = getBallColor(n);
      return `<div class="ball" style="background:${color}">${n}</div>`;
    }).join('');
  }

  function renderHistory() {
    const el = document.getElementById('historyList');
    if (!state.history.length) {
      el.innerHTML = '<div style="font-size:0.78rem;color:#bbb">아직 이력이 없습니다</div>';
      return;
    }
    el.innerHTML = state.history.map((nums, i) => {
      const balls = nums.map(n => {
        const c = getBallColor(n);
        return `<span class="history-num" style="background:${c}">${n}</span>`;
      }).join('');
      return `<div class="history-item">#${i + 1} ${balls}</div>`;
    }).join('');
  }

  // ── 토스트 ───────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  // ── 초기화 ───────────────────────────────────────────
  buildGrid();
  render();
  renderResult([]);
  renderHistory();
</script>
</body>
</html>
